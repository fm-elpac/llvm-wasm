# 手动运行: 编译 llvm win32-x64
name: build win32-x64

on:
  workflow_dispatch:
    inputs:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # 下载代码并编译
      - run: make clone-llvm

      # llvm: win32-x64
      - run: make build-win32-x64

      # 测试运行
      - run: llvm-win32-x64/llc.exe --version

      - uses: actions/upload-artifact@v6
        with:
          name: llvm-win32-x64
          path: llvm-win32-x64
